name: Publish

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Verify tag is on main branch
        run: |
          git fetch origin main
          git merge-base --is-ancestor HEAD origin/main || {
            echo "ERROR: Tag must be pushed on/merged into the main branch to trigger a release."
            exit 1
          }
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm publish --provenance --access public
